name: Update Suno Song Stats

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - manual_add
      song_url:
        description: "Suno song URL for manual_add mode"
        required: false
        type: string

  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Decide update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected mode:"
          cat "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Load latest data from data branch
        run: |
          mkdir -p data

          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "[data branch] Found origin/data. Loading latest data files."

            for file in \
              suno_song_db.zip \
              suno_song_history.zip \
              suno_song_archive.zip \
              suno_rank_history.zip \
              suno_app_payload.zip \
              manual_song_queue.csv
            do
              if git cat-file -e origin/data:data/$file 2>/dev/null; then
                git show origin/data:data/$file > data/$file
                echo "[data branch] Loaded data/$file"
              else
                echo "[data branch] data/$file not found. Skipping."
              fi
            done
          else
            echo "[data branch] origin/data not found. Using files from main branch."
          fi

          echo "[data branch] Current data files:"
          ls -lh data || true

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Debug CSV before update
        run: |
          echo "Before update:"
          ls -lh data || true

          python - <<'PY'
          import os
          import pandas as pd

          for path in [
              "data/suno_song_db.csv",
              "data/suno_song_history.csv",
              "data/suno_song_archive.csv",
              "data/suno_rank_history.csv",
              "data/manual_song_queue.csv",
          ]:
              print(f"[before] {path} exists={os.path.exists(path)}")
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[before] {path} rows={len(df)}")
          PY

      - name: Full update public song pages
        if: steps.mode.outputs.mode == 'full'
        env:
          REQUEST_SLEEP_SECONDS: "0.8"
          MAX_UPDATE_ROWS: "300"
          NEW_SONGS_PAGES: "3"
          NEW_SONGS_PAGE_SIZE: "50"
          SONG_RETENTION_DAYS: "4"
        run: |
          python scripts/update_public_song_pages.py

      - name: Manual add Suno song
        if: steps.mode.outputs.mode == 'manual_add'
        env:
          MANUAL_SUNO_URL: ${{ github.event.inputs.song_url }}
          SONG_RETENTION_DAYS: "4"
          REQUEST_SLEEP_SECONDS: "0.8"
        run: |
          python scripts/manual_add_song.py

      - name: Process manual song queue
        env:
          MANUAL_QUEUE_MAX_ITEMS: "20"
          SONG_RETENTION_DAYS: "4"
          REQUEST_SLEEP_SECONDS: "0.8"
        run: |
          if [ -f scripts/process_manual_queue.py ]; then
            python scripts/process_manual_queue.py
          else
            echo "[manual_queue] scripts/process_manual_queue.py not found. Skipping."
          fi

      - name: Validate CSV after update
        run: |
          echo "After update script:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          hist_path = "data/suno_song_history.csv"
          archive_path = "data/suno_song_archive.csv"
          rank_history_path = "data/suno_rank_history.csv"
          queue_path = "data/manual_song_queue.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[after] {db_path} rows={len(db)}")

          for path in [hist_path, archive_path, rank_history_path, queue_path]:
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[after] {path} rows={len(df)}")
              else:
                  print(f"[after] {path} missing")

          mode = "${{ steps.mode.outputs.mode }}"

          if mode == "full" and len(db) <= 206:
              print("[ERROR] Full update finished but DB CSV still has <= 206 rows.")
              print("[ERROR] update_public_song_pages.py probably did not save the expanded DB.")
              sys.exit(1)
          PY

      - name: Analyze comment quality
        env:
          COMMENT_ANALYZE_TOP_N: "100"
          COMMENT_MAX_PAGES: "2"
          COMMENT_MAX_ITEMS_PER_SONG: "80"
          COMMENT_REQUEST_SLEEP_SECONDS: "0.8"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/analyze_comment_quality.py

      - name: Update rank movement
        env:
          RANK_MOVEMENT_TOP_N: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_rank_movement.py

      - name: Analyze loudness
        env:
          LOUDNESS_ANALYZE_MAX_ITEMS: "30"
          LOUDNESS_PRIORITY_TOP_N: "300"
          LOUDNESS_TARGET_LUFS: "-14.0"
          LOUDNESS_TRUE_PEAK_CEILING_DB: "-1.0"
          LOUDNESS_MAX_BOOST_DB: "6.0"
          LOUDNESS_MAX_CUT_DB: "-12.0"
          LOUDNESS_FFMPEG_TIMEOUT_SECONDS: "180"
        run: |
          python scripts/analyze_loudness.py

      - name: Build app payload
        env:
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
          PAYLOAD_NEW_SONGS_LIMIT: "300"
          PAYLOAD_TOP200_LIMIT: "200"
          PAYLOAD_RAIN_CREW_LIMIT: "300"
          PAYLOAD_HISTORY_POINTS: "80"
        run: |
          python scripts/build_app_payload.py

          echo "After build app payload:"
          ls -lh data || true

          if [ ! -f data/suno_app_payload.json ]; then
            echo "[ERROR] data/suno_app_payload.json was not created"
            exit 1
          fi

      - name: Validate CSV after payload build
        run: |
          echo "After payload build:"
          ls -lh data || true

          python - <<'PY'
          import json
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          quality_path = "data/suno_comment_quality.csv"
          queue_path = "data/manual_song_queue.csv"
          payload_path = "data/suno_app_payload.json"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[quality after] db_rows={len(db)}")

          for col in [
              "adjusted_comment_count",
              "comment_quality_ratio",
              "previous_rank",
              "current_rank",
              "rank_change",
              "rank_status",
              "current_score",
              "base_score",
              "growth_score",
              "freshness_score",
              "best_rank",
              "best_trend_score",
              "integrated_lufs",
              "true_peak_db",
              "loudness_gain_db",
              "loudness_status",
          ]:
              print(f"[quality after] has_{col}={col in db.columns}")

          for col in [
              "created_at",
              "lyrics",
              "prompt",
              "gpt_description_prompt",
              "display_tags",
              "audio_url",
              "image_url",
          ]:
              if col in db.columns:
                  s = db[col].astype(str).str.strip()
                  valid = (~s.str.lower().isin(["", "nan", "none", "null", "<na>", "-"])).sum()
                  print(f"[detail after] {col}_valid={valid}/{len(db)}")
              else:
                  print(f"[detail after] missing_{col}=True")

          if os.path.exists(quality_path):
              q = pd.read_csv(quality_path)
              print(f"[quality after] quality_rows={len(q)}")
          else:
              print(f"[quality after] {quality_path} missing")

          if os.path.exists(queue_path):
              queue = pd.read_csv(queue_path)
              print(f"[quality after] queue_rows={len(queue)}")
          else:
              print(f"[quality after] {queue_path} missing")

          if not os.path.exists(payload_path):
              print(f"[ERROR] Missing {payload_path}")
              sys.exit(1)

          with open(payload_path, "r", encoding="utf-8") as f:
              payload = json.load(f)

          tabs = payload.get("tabs", {})
          print(f"[payload] tabs={list(tabs.keys())}")

          for key, tab in tabs.items():
              songs = tab.get("songs", [])
              print(f"[payload] {key}_songs={len(songs)}")
          PY

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Validate encrypted output changed
        run: |
          echo "After encrypt:"
          ls -lh \
            data/suno_song_db.zip \
            data/suno_song_history.zip \
            data/suno_song_archive.zip \
            data/suno_rank_history.zip \
            data/suno_app_payload.zip \
            || true

          if [ ! -f data/suno_app_payload.zip ]; then
            echo "[ERROR] data/suno_app_payload.zip was not created"
            echo "[ERROR] Check scripts/encrypt_data.py. It must encrypt data/suno_app_payload.json."
            exit 1
          fi

          git status --short

      - name: Remove plain CSV and JSON files
        run: |
          rm -f data/suno_song_db.csv
          rm -f data/suno_song_history.csv
          rm -f data/suno_song_archive.csv
          rm -f data/suno_rank_history.csv
          rm -f data/suno_comment_quality.csv
          rm -f data/suno_app_payload.json

      - name: Commit encrypted data to data branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          DATA_BRANCH_DIR="/tmp/suno-data-branch"

          rm -rf "$DATA_BRANCH_DIR"

          for attempt in 1 2 3; do
            echo "Fetch attempt $attempt/3..."
            if git fetch origin data; then
              break
            fi

            if [ $attempt -eq 3 ]; then
              echo "Fetch failed after 3 attempts. Will try to create data branch if needed."
              break
            fi

            sleep $((2 ** attempt))
          done

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "Using existing origin/data branch"
            git worktree add -B data "$DATA_BRANCH_DIR" origin/data
          else
            echo "Creating new data branch"
            git worktree add -B data "$DATA_BRANCH_DIR"
            cd "$DATA_BRANCH_DIR"
            git rm -r . || true
            cd -
          fi

          mkdir -p "$DATA_BRANCH_DIR/data"

          for file in \
            suno_song_db.zip \
            suno_song_history.zip \
            suno_song_archive.zip \
            suno_rank_history.zip \
            suno_app_payload.zip \
            manual_song_queue.csv
          do
            if [ -f data/$file ]; then
              cp data/$file "$DATA_BRANCH_DIR/data/$file"
              echo "[copy] data/$file"
            else
              echo "[copy] data/$file not found. Skipping."
            fi
          done

          cd "$DATA_BRANCH_DIR"

          for file in \
            suno_song_db.zip \
            suno_song_history.zip \
            suno_song_archive.zip \
            suno_rank_history.zip \
            suno_app_payload.zip \
            manual_song_queue.csv
          do
            if [ -f data/$file ]; then
              git add data/$file
              echo "[git add] data/$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No data changes to commit on data branch"
          else
            if [ "${{ steps.mode.outputs.mode }}" = "manual_add" ]; then
              git commit -m "Manual add Suno song"
            else
              git commit -m "Update encrypted Suno data"
            fi

            for attempt in 1 2 3; do
              echo "Push attempt $attempt/3..."
              if git push origin HEAD:data; then
                echo "Pushed data to data branch successfully."
                break
              elif [ $attempt -lt 3 ]; then
                sleep $((2 ** attempt))
                git fetch origin data || true
                git rebase origin/data || true
              else
                echo "Failed to push after 3 attempts"
                exit 1
              fi
            done
          fi
