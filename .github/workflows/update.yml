name: Update Suno Song Stats

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - fast

  schedule:
    # Full update: 신규곡 수집 + 대량 업데이트
    - cron: "5,35 * * * *"

    # Fast update: 현재 Top 200만 업데이트
    - cron: "15,25,45,55 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Decide update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5,35 * * * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=fast" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected mode:"
          cat "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Debug CSV before update
        run: |
          echo "Before update:"
          ls -lh data || true
          python - <<'PY'
          import os
          import pandas as pd

          for path in ["data/suno_song_db.csv", "data/suno_song_history.csv"]:
              print(f"[before] {path} exists={os.path.exists(path)}")
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[before] {path} rows={len(df)}")
          PY

      - name: Full update public song pages
        if: steps.mode.outputs.mode == 'full'
        env:
          REQUEST_SLEEP_SECONDS: "0.8"
          MAX_UPDATE_ROWS: "2000"
          NEW_SONGS_PAGES: "3"
          NEW_SONGS_PAGE_SIZE: "50"
          SONG_RETENTION_DAYS: "4"
        run: |
          python scripts/update_public_song_pages.py

      - name: Fast update current Top 200
        if: steps.mode.outputs.mode == 'fast'
        env:
          REQUEST_SLEEP_SECONDS: "0.5"
          TOP_N_FAST_UPDATE: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "2.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_top200_fast.py

      - name: Validate CSV after update
        run: |
          echo "After update script:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          hist_path = "data/suno_song_history.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[after] {db_path} rows={len(db)}")

          if os.path.exists(hist_path):
              hist = pd.read_csv(hist_path)
              print(f"[after] {hist_path} rows={len(hist)}")
          else:
              print(f"[after] {hist_path} missing")

          # full 모드에서 신규곡 수집 후에도 206 그대로면 저장 실패로 간주
          mode = "${{ steps.mode.outputs.mode }}"
          if mode == "full" and len(db) <= 206:
              print("[ERROR] Full update finished but DB CSV still has <= 206 rows.")
              print("[ERROR] update_public_song_pages.py probably did not save the expanded DB to data/suno_song_db.csv.")
              sys.exit(1)
          PY

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Validate encrypted output changed
        run: |
          echo "After encrypt:"
          ls -lh data/suno_song_db.zip data/suno_song_history.zip || true
          git status --short

      - name: Remove plain CSV files
        run: |
          rm -f data/suno_song_db.csv
          rm -f data/suno_song_history.csv

      - name: Commit encrypted data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main

          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse origin/main)

          if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ]; then
            echo "Remote main changed during this workflow."
            echo "Skipping data commit to avoid binary ZIP conflict."
            echo "Next scheduled run will update from the latest main."
            exit 0
          fi

          git add data/suno_song_db.zip data/suno_song_history.zip

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
              git commit -m "Update encrypted Suno data"
            else
              git commit -m "Fast update Top 200 Suno stats"
            fi

            if git push origin main; then
              echo "Pushed encrypted data successfully."
            else
              echo "Push was rejected, probably because remote main changed at the same time."
              echo "Skipping this run safely. Next scheduled run will retry."
              exit 0
            fi
          fi
