name: Update Suno Song Stats

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - fast
          - manual_add
      song_url:
        description: "Suno song URL for manual_add mode"
        required: false
        type: string

  schedule:
    # Full update: 신규곡 수집 + 대량 업데이트
    - cron: "5,35 * * * *"

    # Fast update: 현재 Top 200만 업데이트
    - cron: "15,25,45,55 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Decide update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5,35 * * * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=fast" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected mode:"
          cat "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Backup CSV before update
        run: |
          mkdir -p /tmp/suno-backup

          if [ -f data/suno_song_db.csv ]; then
            cp data/suno_song_db.csv /tmp/suno-backup/suno_song_db_before.csv
          fi

          if [ -f data/suno_song_history.csv ]; then
            cp data/suno_song_history.csv /tmp/suno-backup/suno_song_history_before.csv
          fi

          python - <<'PY'
          import os
          import pandas as pd

          db_path = "/tmp/suno-backup/suno_song_db_before.csv"
          hist_path = "/tmp/suno-backup/suno_song_history_before.csv"

          if os.path.exists(db_path):
              db = pd.read_csv(db_path)
              print(f"[backup] db_rows_before={len(db)}")
          else:
              print("[backup] db backup missing")

          if os.path.exists(hist_path):
              hist = pd.read_csv(hist_path)
              print(f"[backup] history_rows_before={len(hist)}")
          else:
              print("[backup] history backup missing")
          PY

      - name: Debug CSV before update
        run: |
          echo "Before update:"
          ls -lh data || true
          python - <<'PY'
          import os
          import pandas as pd

          for path in ["data/suno_song_db.csv", "data/suno_song_history.csv"]:
              print(f"[before] {path} exists={os.path.exists(path)}")
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[before] {path} rows={len(df)}")
          PY

      - name: Full update public song pages
        if: steps.mode.outputs.mode == 'full'
        env:
          REQUEST_SLEEP_SECONDS: "0.8"
          MAX_UPDATE_ROWS: "2000"
          NEW_SONGS_PAGES: "3"
          NEW_SONGS_PAGE_SIZE: "50"
          SONG_RETENTION_DAYS: "4"
        run: |
          python scripts/update_public_song_pages.py

      - name: Fast update current Top 200
        if: steps.mode.outputs.mode == 'fast'
        env:
          REQUEST_SLEEP_SECONDS: "0.5"
          TOP_N_FAST_UPDATE: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_top200_fast.py

      - name: Manual add Suno song
        if: steps.mode.outputs.mode == 'manual_add'
        env:
          MANUAL_SUNO_URL: ${{ github.event.inputs.song_url }}
          SONG_RETENTION_DAYS: "4"
          REQUEST_SLEEP_SECONDS: "0.5"
        run: |
          python scripts/manual_add_song.py

      - name: Repair DB if fast update shrank rows
        if: steps.mode.outputs.mode == 'fast'
        run: |
          python - <<'PY'
          import os
          import sys
          import pandas as pd

          before_path = "/tmp/suno-backup/suno_song_db_before.csv"
          after_path = "data/suno_song_db.csv"

          if not os.path.exists(before_path):
              print("[fast repair] backup missing, skip")
              sys.exit(0)

          if not os.path.exists(after_path):
              print("[fast repair] after DB missing")
              sys.exit(1)

          before = pd.read_csv(before_path)
          after = pd.read_csv(after_path)

          print(f"[fast repair] before_rows={len(before)} after_rows={len(after)}")

          if "id" not in before.columns or "id" not in after.columns:
              print("[fast repair] id column missing, skip")
              sys.exit(0)

          before["id"] = before["id"].astype(str)
          after["id"] = after["id"].astype(str)

          if len(after) < len(before):
              after_ids = set(after["id"].dropna().astype(str))
              restored_old = before[~before["id"].isin(after_ids)].copy()

              repaired = pd.concat([after, restored_old], ignore_index=True)

              if "created_at" in repaired.columns:
                  repaired["created_at_dt"] = pd.to_datetime(
                      repaired["created_at"],
                      errors="coerce",
                      utc=True,
                  )
                  repaired = repaired.sort_values(
                      "created_at_dt",
                      ascending=False,
                      na_position="last",
                  )
                  repaired = repaired.drop(columns=["created_at_dt"], errors="ignore")

              repaired = repaired.drop_duplicates(subset=["id"], keep="first")
              repaired.to_csv(after_path, index=False, encoding="utf-8-sig")

              check = pd.read_csv(after_path)
              print(f"[fast repair] repaired_rows={len(check)} -> {after_path}")
          else:
              print("[fast repair] no shrink detected")
          PY

      - name: Validate CSV after update
        run: |
          echo "After update script:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          hist_path = "data/suno_song_history.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[after] {db_path} rows={len(db)}")

          if os.path.exists(hist_path):
              hist = pd.read_csv(hist_path)
              print(f"[after] {hist_path} rows={len(hist)}")
          else:
              print(f"[after] {hist_path} missing")

          mode = "${{ steps.mode.outputs.mode }}"

          if mode == "full" and len(db) <= 206:
              print("[ERROR] Full update finished but DB CSV still has <= 206 rows.")
              print("[ERROR] update_public_song_pages.py probably did not save the expanded DB to data/suno_song_db.csv.")
              sys.exit(1)

          if mode == "fast":
              before_path = "/tmp/suno-backup/suno_song_db_before.csv"

              if os.path.exists(before_path):
                  before = pd.read_csv(before_path)
                  if len(db) < len(before):
                      print("[ERROR] Fast update still shrank DB after repair.")
                      print(f"[ERROR] before={len(before)} after={len(db)}")
                      sys.exit(1)
          PY

      - name: Analyze comment quality
        env:
          COMMENT_ANALYZE_TOP_N: "200"
          COMMENT_MAX_PAGES: "3"
          COMMENT_MAX_ITEMS_PER_SONG: "120"
          COMMENT_REQUEST_SLEEP_SECONDS: "0.4"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/analyze_comment_quality.py

      - name: Update rank movement
        env:
          RANK_MOVEMENT_TOP_N: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_rank_movement.py

      - name: Validate CSV after comment quality
        run: |
          echo "After comment quality analysis:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          quality_path = "data/suno_comment_quality.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[quality after] db_rows={len(db)}")

          for col in ["adjusted_comment_count", "comment_quality_ratio", "previous_rank", "current_rank", "rank_change", "rank_status"]:
              print(f"[quality after] has_{col}={col in db.columns}")

          if os.path.exists(quality_path):
              q = pd.read_csv(quality_path)
              print(f"[quality after] quality_rows={len(q)}")
          else:
              print(f"[quality after] {quality_path} missing")
          PY

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Validate encrypted output changed
        run: |
          echo "After encrypt:"
          ls -lh data/suno_song_db.zip data/suno_song_history.zip || true
          git status --short

      - name: Remove plain CSV files
        run: |
          rm -f data/suno_song_db.csv
          rm -f data/suno_song_history.csv
          rm -f data/suno_comment_quality.csv

      - name: Commit encrypted data to data branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          DATA_BRANCH_DIR="/tmp/suno-data-branch"

          rm -rf "$DATA_BRANCH_DIR"

          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "Using existing origin/data branch"
            git worktree add -B data "$DATA_BRANCH_DIR" origin/data
          else
            echo "Creating new data branch"
            git worktree add -B data "$DATA_BRANCH_DIR"
            cd "$DATA_BRANCH_DIR"
            git rm -r . || true
            cd -
          fi

          mkdir -p "$DATA_BRANCH_DIR/data"

          cp data/suno_song_db.zip "$DATA_BRANCH_DIR/data/suno_song_db.zip"
          cp data/suno_song_history.zip "$DATA_BRANCH_DIR/data/suno_song_history.zip"

          cd "$DATA_BRANCH_DIR"

          git add data/suno_song_db.zip data/suno_song_history.zip

          if git diff --cached --quiet; then
            echo "No encrypted data changes to commit on data branch"
          else
            if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
              git commit -m "Update encrypted Suno data"
            else
              git commit -m "Fast update Top 200 Suno stats"
            fi

            git push origin HEAD:data
            echo "Pushed encrypted data to data branch successfully."
          fi
