name: Update Suno Song Stats

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "existing"
        type: choice
        options:
          - full
          - new
          - existing
          - comments
          - loudness
          - payload
      max_update_rows:
        description: "Existing-song rows to update"
        required: true
        default: "1200"

permissions:
  contents: read

concurrency:
  group: suno-supabase-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  REQUEST_SLEEP_SECONDS: "0.8"
  KEEP_EXPIRED_SONGS_IN_DB: "1"

jobs:
  update-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate Supabase secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${SUPABASE_URL:-}" ]] || (echo "Missing SUPABASE_URL" && exit 1)
          [[ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          echo "Supabase config present"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selected update stage
        run: |
          set -euo pipefail
          python scripts/update_supabase_data.py \
            --mode "${{ inputs.mode }}" \
            --max-update-rows "${{ inputs.max_update_rows }}"
