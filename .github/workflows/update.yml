name: Update Suno Song Stats

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full_parallel"
        type: choice
        options:
          - full_parallel
          - existing_parallel
          - new_only
          - manual_add
      song_url:
        description: "Suno song URL for manual_add mode"
        required: false
        type: string

  schedule:
    # 신규곡 수집 포함: 30분마다 1회
    - cron: "0,30 * * * *"
    # 기존곡 수치 갱신만: 30분 사이에 1회씩 추가 실행
    - cron: "15,45 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  SHARD_COUNT: "4"
  SHARD_UPDATE_ROWS_TOTAL: "1200"
  REQUEST_SLEEP_SECONDS: "0.8"
  SONG_RETENTION_DAYS: "4"
  GROWTH_WINDOW_HOURS: "3"
  PLAY_WEIGHT: "1.0"
  LIKE_WEIGHT: "3.0"
  COMMENT_WEIGHT: "4.0"
  GROWTH_WEIGHT: "1.5"
  FRESHNESS_WEIGHT: "35.0"
  FRESHNESS_POWER: "1.35"

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      run_new_songs: ${{ steps.mode.outputs.run_new_songs }}
      run_existing_shards: ${{ steps.mode.outputs.run_existing_shards }}
      run_manual_add: ${{ steps.mode.outputs.run_manual_add }}
    steps:
      - name: Decide update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0,30 * * * *" ]; then
            MODE="full_parallel"
          else
            MODE="existing_parallel"
          fi

          RUN_NEW="false"
          RUN_EXISTING="false"
          RUN_MANUAL="false"

          if [ "$MODE" = "full_parallel" ]; then
            RUN_NEW="true"
            RUN_EXISTING="true"
          elif [ "$MODE" = "existing_parallel" ]; then
            RUN_EXISTING="true"
          elif [ "$MODE" = "new_only" ]; then
            RUN_NEW="true"
          elif [ "$MODE" = "manual_add" ]; then
            RUN_MANUAL="true"
          else
            echo "Unknown mode: $MODE"
            exit 1
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "run_new_songs=$RUN_NEW" >> "$GITHUB_OUTPUT"
          echo "run_existing_shards=$RUN_EXISTING" >> "$GITHUB_OUTPUT"
          echo "run_manual_add=$RUN_MANUAL" >> "$GITHUB_OUTPUT"

          echo "Selected mode=$MODE new=$RUN_NEW existing=$RUN_EXISTING manual=$RUN_MANUAL"

  prepare-data:
    needs: decide
    if: needs.decide.outputs.run_manual_add != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Load latest data from data branch
        run: |
          mkdir -p data
          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "[data branch] Found origin/data. Loading latest data files."
            for file in \
              suno_song_db.zip \
              suno_song_history.zip \
              suno_song_archive.zip \
              suno_rank_history.zip \
              suno_app_payload.zip \
              manual_song_queue.csv
            do
              if git cat-file -e origin/data:data/$file 2>/dev/null; then
                git show origin/data:data/$file > data/$file
                echo "[data branch] Loaded data/$file"
              else
                echo "[data branch] data/$file not found. Skipping."
              fi
            done
          else
            echo "[data branch] origin/data not found. Using files from main branch."
          fi
          ls -lh data || true

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Discover new songs
        if: needs.decide.outputs.run_new_songs == 'true'
        env:
          NEW_SONGS_PAGES: "3"
          NEW_SONGS_PAGE_SIZE: "50"
          REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
        run: |
          python scripts/update_new_songs_only.py

      - name: Upload prepared decrypted data
        uses: actions/upload-artifact@v4
        with:
          name: prepared-data
          path: |
            data/*.csv
            data/*.json
          retention-days: 1

  fetch-existing-shards:
    needs: [decide, prepare-data]
    if: needs.decide.outputs.run_existing_shards == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Download prepared data
        uses: actions/download-artifact@v4
        with:
          name: prepared-data
          path: data

      - name: Fetch existing song shard
        env:
          REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
          MAX_UPDATE_ROWS: ${{ env.SHARD_UPDATE_ROWS_TOTAL }}
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
        run: |
          python scripts/update_existing_song_shard.py \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${{ env.SHARD_COUNT }} \
            --output-dir data/partial_updates

      - name: Upload shard result
        uses: actions/upload-artifact@v4
        with:
          name: partial-update-${{ matrix.shard }}
          path: data/partial_updates/*.csv
          retention-days: 1

  merge-and-publish:
    needs: [decide, prepare-data, fetch-existing-shards]
    if: always() && needs.decide.outputs.run_manual_add != 'true' && needs['prepare-data'].result == 'success' && (needs.decide.outputs.run_existing_shards != 'true' || needs['fetch-existing-shards'].result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Download prepared data
        uses: actions/download-artifact@v4
        with:
          name: prepared-data
          path: data

      - name: Download shard results
        if: needs.decide.outputs.run_existing_shards == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: partial-update-*
          path: data/partial_updates
          merge-multiple: true

      - name: Merge shard updates
        if: needs.decide.outputs.run_existing_shards == 'true'
        env:
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
        run: |
          python scripts/merge_shard_updates.py

      - name: Process manual song queue
        if: needs.decide.outputs.run_new_songs == 'true'
        env:
          MANUAL_QUEUE_MAX_ITEMS: "20"
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
        run: |
          if [ -f scripts/process_manual_queue.py ]; then
            python scripts/process_manual_queue.py
          else
            echo "[manual_queue] scripts/process_manual_queue.py not found. Skipping."
          fi

      - name: Validate CSV before scoring
        run: |
          ls -lh data || true
          python - <<'PY'
          import os
          import sys
          import pandas as pd
          db_path = "data/suno_song_db.csv"
          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)
          db = pd.read_csv(db_path)
          print(f"[validate] {db_path} rows={len(db)}")
          if len(db) <= 206:
              print("[ERROR] DB CSV still has <= 206 rows; refusing to publish.")
              sys.exit(1)
          for path in [
              "data/suno_song_history.csv",
              "data/suno_song_archive.csv",
              "data/suno_rank_history.csv",
              "data/manual_song_queue.csv",
          ]:
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[validate] {path} rows={len(df)}")
              else:
                  print(f"[validate] {path} missing")
          PY

      - name: Analyze comment quality
        env:
          COMMENT_ANALYZE_TOP_N: "100"
          COMMENT_MAX_PAGES: "2"
          COMMENT_MAX_ITEMS_PER_SONG: "80"
          COMMENT_REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          GROWTH_WINDOW_HOURS: ${{ env.GROWTH_WINDOW_HOURS }}
          PLAY_WEIGHT: ${{ env.PLAY_WEIGHT }}
          LIKE_WEIGHT: ${{ env.LIKE_WEIGHT }}
          COMMENT_WEIGHT: ${{ env.COMMENT_WEIGHT }}
          GROWTH_WEIGHT: ${{ env.GROWTH_WEIGHT }}
          FRESHNESS_WEIGHT: ${{ env.FRESHNESS_WEIGHT }}
          FRESHNESS_POWER: ${{ env.FRESHNESS_POWER }}
        run: |
          python scripts/analyze_comment_quality.py

      - name: Update rank movement
        env:
          RANK_MOVEMENT_TOP_N: "200"
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          GROWTH_WINDOW_HOURS: ${{ env.GROWTH_WINDOW_HOURS }}
          PLAY_WEIGHT: ${{ env.PLAY_WEIGHT }}
          LIKE_WEIGHT: ${{ env.LIKE_WEIGHT }}
          COMMENT_WEIGHT: ${{ env.COMMENT_WEIGHT }}
          GROWTH_WEIGHT: ${{ env.GROWTH_WEIGHT }}
          FRESHNESS_WEIGHT: ${{ env.FRESHNESS_WEIGHT }}
          FRESHNESS_POWER: ${{ env.FRESHNESS_POWER }}
        run: |
          python scripts/update_rank_movement.py

      - name: Analyze loudness
        env:
          LOUDNESS_ANALYZE_MAX_ITEMS: "30"
          LOUDNESS_PRIORITY_TOP_N: "300"
          LOUDNESS_TARGET_LUFS: "-14.0"
          LOUDNESS_TRUE_PEAK_CEILING_DB: "-1.0"
          LOUDNESS_MAX_BOOST_DB: "6.0"
          LOUDNESS_MAX_CUT_DB: "-12.0"
          LOUDNESS_FFMPEG_TIMEOUT_SECONDS: "180"
        run: |
          python scripts/analyze_loudness.py

      - name: Build app payload
        env:
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          GROWTH_WINDOW_HOURS: ${{ env.GROWTH_WINDOW_HOURS }}
          PLAY_WEIGHT: ${{ env.PLAY_WEIGHT }}
          LIKE_WEIGHT: ${{ env.LIKE_WEIGHT }}
          COMMENT_WEIGHT: ${{ env.COMMENT_WEIGHT }}
          GROWTH_WEIGHT: ${{ env.GROWTH_WEIGHT }}
          FRESHNESS_WEIGHT: ${{ env.FRESHNESS_WEIGHT }}
          FRESHNESS_POWER: ${{ env.FRESHNESS_POWER }}
          PAYLOAD_NEW_SONGS_LIMIT: "300"
          PAYLOAD_TOP200_LIMIT: "200"
          PAYLOAD_RAIN_CREW_LIMIT: "300"
          PAYLOAD_HISTORY_POINTS: "80"
        run: |
          python scripts/build_app_payload.py
          test -f data/suno_app_payload.json

      - name: Validate payload
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import pandas as pd
          payload_path = "data/suno_app_payload.json"
          db_path = "data/suno_song_db.csv"
          if not os.path.exists(payload_path):
              print(f"[ERROR] Missing {payload_path}")
              sys.exit(1)
          with open(payload_path, "r", encoding="utf-8") as f:
              payload = json.load(f)
          print("[payload] tabs=", list((payload.get("tabs") or {}).keys()))
          print("[payload] meta=", payload.get("meta", {}))
          if os.path.exists(db_path):
              print("[payload] db_rows=", len(pd.read_csv(db_path)))
          PY

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Publish data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/suno-data-branch
          git clone --depth 1 --branch data "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" /tmp/suno-data-branch || true

          if [ ! -d /tmp/suno-data-branch/.git ]; then
            git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" /tmp/suno-data-branch
            cd /tmp/suno-data-branch
            git checkout --orphan data
            git rm -rf . || true
          else
            cd /tmp/suno-data-branch
          fi

          mkdir -p data
          cp "$GITHUB_WORKSPACE"/data/*.zip data/ 2>/dev/null || true
          cp "$GITHUB_WORKSPACE"/data/manual_song_queue.csv data/ 2>/dev/null || true

          git add data
          git commit -m "Update Suno data" || echo "No data changes to commit"
          git push origin data

  manual-add:
    needs: decide
    if: needs.decide.outputs.run_manual_add == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Load latest data from data branch
        run: |
          mkdir -p data
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            for file in \
              suno_song_db.zip \
              suno_song_history.zip \
              suno_song_archive.zip \
              suno_rank_history.zip \
              suno_app_payload.zip \
              manual_song_queue.csv
            do
              if git cat-file -e origin/data:data/$file 2>/dev/null; then
                git show origin/data:data/$file > data/$file
              fi
            done
          fi

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Manual add Suno song
        env:
          MANUAL_SUNO_URL: ${{ github.event.inputs.song_url }}
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
        run: |
          python scripts/manual_add_song.py

      - name: Process manual queue
        env:
          MANUAL_QUEUE_MAX_ITEMS: "20"
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          REQUEST_SLEEP_SECONDS: ${{ env.REQUEST_SLEEP_SECONDS }}
        run: |
          python scripts/process_manual_queue.py

      - name: Build app payload
        env:
          SONG_RETENTION_DAYS: ${{ env.SONG_RETENTION_DAYS }}
          GROWTH_WINDOW_HOURS: ${{ env.GROWTH_WINDOW_HOURS }}
          PLAY_WEIGHT: ${{ env.PLAY_WEIGHT }}
          LIKE_WEIGHT: ${{ env.LIKE_WEIGHT }}
          COMMENT_WEIGHT: ${{ env.COMMENT_WEIGHT }}
          GROWTH_WEIGHT: ${{ env.GROWTH_WEIGHT }}
          FRESHNESS_WEIGHT: ${{ env.FRESHNESS_WEIGHT }}
          FRESHNESS_POWER: ${{ env.FRESHNESS_POWER }}
          PAYLOAD_NEW_SONGS_LIMIT: "300"
          PAYLOAD_TOP200_LIMIT: "200"
          PAYLOAD_RAIN_CREW_LIMIT: "300"
          PAYLOAD_HISTORY_POINTS: "80"
        run: |
          python scripts/update_rank_movement.py
          python scripts/build_app_payload.py

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Publish data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/suno-data-branch
          git clone --depth 1 --branch data "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" /tmp/suno-data-branch || true
          if [ ! -d /tmp/suno-data-branch/.git ]; then
            git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" /tmp/suno-data-branch
            cd /tmp/suno-data-branch
            git checkout --orphan data
            git rm -rf . || true
          else
            cd /tmp/suno-data-branch
          fi
          mkdir -p data
          cp "$GITHUB_WORKSPACE"/data/*.zip data/ 2>/dev/null || true
          cp "$GITHUB_WORKSPACE"/data/manual_song_queue.csv data/ 2>/dev/null || true
          git add data
          git commit -m "Manual add Suno song" || echo "No data changes to commit"
          git push origin data
