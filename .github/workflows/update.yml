name: Update Suno Song Stats

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - manual_add
      song_url:
        description: "Suno song URL for manual_add mode"
        required: false
        type: string

  schedule:
    # Full update every 15 minutes
    - cron: "*/15 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Decide update mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected mode:"
          cat "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Load latest data from data branch
        run: |
          mkdir -p data

          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "[data branch] Found origin/data. Loading latest data files."

            if git cat-file -e origin/data:data/suno_song_db.zip 2>/dev/null; then
              git show origin/data:data/suno_song_db.zip > data/suno_song_db.zip
              echo "[data branch] Loaded data/suno_song_db.zip"
            else
              echo "[data branch] data/suno_song_db.zip not found. Keeping existing file."
            fi

            if git cat-file -e origin/data:data/suno_song_history.zip 2>/dev/null; then
              git show origin/data:data/suno_song_history.zip > data/suno_song_history.zip
              echo "[data branch] Loaded data/suno_song_history.zip"
            else
              echo "[data branch] data/suno_song_history.zip not found. Keeping existing file."
            fi

            if git cat-file -e origin/data:data/manual_song_queue.csv 2>/dev/null; then
              git show origin/data:data/manual_song_queue.csv > data/manual_song_queue.csv
              echo "[data branch] Loaded data/manual_song_queue.csv"
            else
              echo "[data branch] data/manual_song_queue.csv not found. Starting without queue."
            fi
          else
            echo "[data branch] origin/data not found. Using files from main branch."
          fi

          echo "[data branch] Current data files:"
          ls -lh data || true

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Debug CSV before update
        run: |
          echo "Before update:"
          ls -lh data || true

          python - <<'PY'
          import os
          import pandas as pd

          for path in [
              "data/suno_song_db.csv",
              "data/suno_song_history.csv",
              "data/manual_song_queue.csv",
          ]:
              print(f"[before] {path} exists={os.path.exists(path)}")
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f"[before] {path} rows={len(df)}")
          PY

      - name: Full update public song pages
        if: steps.mode.outputs.mode == 'full'
        env:
          REQUEST_SLEEP_SECONDS: "0.8"
          MAX_UPDATE_ROWS: "300"
          NEW_SONGS_PAGES: "3"
          NEW_SONGS_PAGE_SIZE: "50"
          SONG_RETENTION_DAYS: "4"
        run: |
          python scripts/update_public_song_pages.py

      - name: Manual add Suno song
        if: steps.mode.outputs.mode == 'manual_add'
        env:
          MANUAL_SUNO_URL: ${{ github.event.inputs.song_url }}
          SONG_RETENTION_DAYS: "4"
          REQUEST_SLEEP_SECONDS: "0.8"
        run: |
          python scripts/manual_add_song.py

      - name: Process manual song queue
        env:
          MANUAL_QUEUE_MAX_ITEMS: "20"
          SONG_RETENTION_DAYS: "4"
          REQUEST_SLEEP_SECONDS: "0.8"
        run: |
          if [ -f scripts/process_manual_queue.py ]; then
            python scripts/process_manual_queue.py
          else
            echo "[manual_queue] scripts/process_manual_queue.py not found. Skipping."
          fi

      - name: Validate CSV after update
        run: |
          echo "After update script:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          hist_path = "data/suno_song_history.csv"
          queue_path = "data/manual_song_queue.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[after] {db_path} rows={len(db)}")

          if os.path.exists(hist_path):
              hist = pd.read_csv(hist_path)
              print(f"[after] {hist_path} rows={len(hist)}")
          else:
              print(f"[after] {hist_path} missing")

          if os.path.exists(queue_path):
              q = pd.read_csv(queue_path)
              print(f"[after] {queue_path} rows={len(q)}")
          else:
              print(f"[after] {queue_path} missing")

          mode = "${{ steps.mode.outputs.mode }}"

          if mode == "full" and len(db) <= 206:
              print("[ERROR] Full update finished but DB CSV still has <= 206 rows.")
              print("[ERROR] update_public_song_pages.py probably did not save the expanded DB.")
              sys.exit(1)
          PY

      - name: Analyze comment quality
        env:
          COMMENT_ANALYZE_TOP_N: "100"
          COMMENT_MAX_PAGES: "2"
          COMMENT_MAX_ITEMS_PER_SONG: "80"
          COMMENT_REQUEST_SLEEP_SECONDS: "0.8"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/analyze_comment_quality.py

      - name: Update rank movement
        env:
          RANK_MOVEMENT_TOP_N: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "1.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_rank_movement.py

      - name: Validate CSV after comment quality
        run: |
          echo "After comment quality analysis:"
          ls -lh data || true

          python - <<'PY'
          import os
          import sys
          import pandas as pd

          db_path = "data/suno_song_db.csv"
          quality_path = "data/suno_comment_quality.csv"
          queue_path = "data/manual_song_queue.csv"

          if not os.path.exists(db_path):
              print(f"[ERROR] Missing {db_path}")
              sys.exit(1)

          db = pd.read_csv(db_path)
          print(f"[quality after] db_rows={len(db)}")

          for col in [
              "adjusted_comment_count",
              "comment_quality_ratio",
              "previous_rank",
              "current_rank",
              "rank_change",
              "rank_status",
          ]:
              print(f"[quality after] has_{col}={col in db.columns}")

          for col in [
              "created_at",
              "lyrics",
              "prompt",
              "gpt_description_prompt",
              "display_tags",
              "audio_url",
              "image_url",
          ]:
              if col in db.columns:
                  s = db[col].astype(str).str.strip()
                  valid = (~s.str.lower().isin(["", "nan", "none", "null", "<na>", "-"])).sum()
                  print(f"[detail after] {col}_valid={valid}/{len(db)}")
              else:
                  print(f"[detail after] missing_{col}=True")

          if os.path.exists(quality_path):
              q = pd.read_csv(quality_path)
              print(f"[quality after] quality_rows={len(q)}")
          else:
              print(f"[quality after] {quality_path} missing")

          if os.path.exists(queue_path):
              queue = pd.read_csv(queue_path)
              print(f"[quality after] queue_rows={len(queue)}")
          else:
              print(f"[quality after] {queue_path} missing")
          PY

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Validate encrypted output changed
        run: |
          echo "After encrypt:"
          ls -lh data/suno_song_db.zip data/suno_song_history.zip || true
          git status --short

      - name: Remove plain CSV files
        run: |
          rm -f data/suno_song_db.csv
          rm -f data/suno_song_history.csv
          rm -f data/suno_comment_quality.csv

      - name: Commit encrypted data to data branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          DATA_BRANCH_DIR="/tmp/suno-data-branch"

          rm -rf "$DATA_BRANCH_DIR"

          # Retry logic for git fetch
          for attempt in 1 2 3; do
            echo "Fetch attempt $attempt/3..."
            if git fetch origin data; then
              break
            fi

            if [ $attempt -eq 3 ]; then
              echo "Fetch failed after 3 attempts. Will try to create data branch if needed."
              break
            fi

            sleep $((2 ** attempt))
          done

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "Using existing origin/data branch"
            git worktree add -B data "$DATA_BRANCH_DIR" origin/data
          else
            echo "Creating new data branch"
            git worktree add -B data "$DATA_BRANCH_DIR"
            cd "$DATA_BRANCH_DIR"
            git rm -r . || true
            cd -
          fi

          mkdir -p "$DATA_BRANCH_DIR/data"

          cp data/suno_song_db.zip "$DATA_BRANCH_DIR/data/suno_song_db.zip"
          cp data/suno_song_history.zip "$DATA_BRANCH_DIR/data/suno_song_history.zip"

          if [ -f data/suno_song_archive.zip ]; then
            cp data/suno_song_archive.zip "$DATA_BRANCH_DIR/data/suno_song_archive.zip"
          fi

          if [ -f data/suno_app_payload.zip ]; then
            cp data/suno_app_payload.zip "$DATA_BRANCH_DIR/data/suno_app_payload.zip"
          fi

          if [ -f data/manual_song_queue.csv ]; then
            cp data/manual_song_queue.csv "$DATA_BRANCH_DIR/data/manual_song_queue.csv"
          fi

          cd "$DATA_BRANCH_DIR"

          git add data/suno_song_db.zip data/suno_song_history.zip

          if [ -f data/suno_song_archive.zip ]; then
            git add data/suno_song_archive.zip
          fi

          if [ -f data/suno_app_payload.zip ]; then
            git add data/suno_app_payload.zip
          fi

          if [ -f data/manual_song_queue.csv ]; then
            git add data/manual_song_queue.csv
          fi

          if git diff --cached --quiet; then
            echo "No data changes to commit on data branch"
          else
            if [ "${{ steps.mode.outputs.mode }}" = "manual_add" ]; then
              git commit -m "Manual add Suno song"
            else
              git commit -m "Update encrypted Suno data"
            fi

            # Retry logic for git push
            for attempt in 1 2 3; do
              echo "Push attempt $attempt/3..."
              if git push origin HEAD:data; then
                echo "Pushed data to data branch successfully."
                break
              elif [ $attempt -lt 3 ]; then
                sleep $((2 ** attempt))
                git fetch origin data || true
                git rebase origin/data || true
              else
                echo "Failed to push after 3 attempts"
                exit 1
              fi
            done
          fi
