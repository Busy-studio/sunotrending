name: Update Existing Suno Songs

on:
  workflow_dispatch:
  schedule:
    - cron: "5,20,35,50 * * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  MAX_UPDATE_ROWS: "1200"
  REQUEST_SLEEP_SECONDS: "0.8"
  UPDATE_TIERING_ENABLED: "1"
  COMMENT_DB_ENABLED: "1"
  COMPACT_HISTORY: "1"
  HISTORY_HIGH_RES_DAYS: "7"

jobs:
  update-existing:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: suno-supabase-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python scripts/update_supabase_data.py --mode existing --max-update-rows "$MAX_UPDATE_ROWS"
