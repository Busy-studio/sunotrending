name: Update New Suno Songs

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

permissions:
  contents: read

concurrency:
  group: suno-supabase-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  REQUEST_SLEEP_SECONDS: "0.8"
  KEEP_EXPIRED_SONGS_IN_DB: "1"
  NEW_MAX_UPDATE_ROWS: "0"

jobs:
  update-new-songs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Update new songs and payload
        run: python scripts/update_supabase_data.py --mode new --new-max-update-rows "$NEW_MAX_UPDATE_ROWS"
