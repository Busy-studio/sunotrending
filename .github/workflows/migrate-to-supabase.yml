name: Migrate Data Branch to Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "false = actually upload to Supabase, true = test only"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      chunk_size:
        description: "Rows per Supabase request"
        required: true
        default: "200"

concurrency:
  group: migrate-data-branch-to-supabase
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
    steps:
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: repo

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data_branch

      - name: Show exact data branch layout
        shell: bash
        run: |
          set -euo pipefail
          echo "Data branch files:"
          find data_branch -maxdepth 3 -type f | sort
          echo "--- data_branch/data directory ---"
          ls -la data_branch/data || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install migration dependencies
        working-directory: repo
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-migration.txt
          pip install pyzipper

      - name: Prepare data files from data branch
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data
          mkdir -p data

          echo "Using existing data branch format: data/*.zip + data/manual_song_queue.csv"

          # Copy current production files exactly as they are stored on the data branch.
          for f in \
            suno_song_db.zip \
            suno_song_history.zip \
            suno_song_archive.zip \
            suno_rank_history.zip \
            suno_app_payload.zip \
            manual_song_queue.csv
          do
            if [[ -f "../data_branch/data/$f" ]]; then
              cp -v "../data_branch/data/$f" "data/$f"
            else
              echo "WARN: ../data_branch/data/$f not found"
            fi
          done

          echo "Copied files into repo/data:"
          find data -maxdepth 1 -type f -print | sort

          test -f data/suno_song_db.zip || { echo "ERROR: data/suno_song_db.zip was not found on data branch."; exit 1; }
          test -f data/suno_song_history.zip || { echo "ERROR: data/suno_song_history.zip was not found on data branch."; exit 1; }
          test -f data/suno_rank_history.zip || { echo "ERROR: data/suno_rank_history.zip was not found on data branch."; exit 1; }
          test -f data/suno_app_payload.zip || { echo "ERROR: data/suno_app_payload.zip was not found on data branch."; exit 1; }
          test -n "${DATA_ZIP_PASSWORD:-}" || { echo "ERROR: DATA_ZIP_PASSWORD GitHub secret is missing."; exit 1; }

          echo "Decrypting component ZIP files..."
          python scripts/decrypt_data.py

          echo "Prepared decrypted migration data files:"
          find data -maxdepth 1 -type f -print | sort

      - name: Validate required input files
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating prepared data directory..."
          ls -la data
          test -f data/suno_song_db.csv || { echo "Missing data/suno_song_db.csv"; exit 1; }
          test -f data/suno_song_history.csv || { echo "Missing data/suno_song_history.csv"; exit 1; }
          test -f data/suno_rank_history.csv || { echo "Missing data/suno_rank_history.csv"; exit 1; }
          test -f data/suno_app_payload.json || { echo "Missing data/suno_app_payload.json"; exit 1; }
          echo "CSV/JSON row counts before upload:"
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          for name in ["suno_song_db.csv", "suno_song_history.csv", "suno_rank_history.csv", "suno_song_archive.csv", "manual_song_queue.csv"]:
              p = Path("data") / name
              if p.exists():
                  print(f"{name}: {len(pd.read_csv(p, dtype=object))} rows")
              else:
                  print(f"{name}: missing")
          p = Path("data") / "suno_app_payload.json"
          print("suno_app_payload.json:", p.stat().st_size, "bytes")
          PY

      - name: Upload to Supabase
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          ARGS="--data-dir data --chunk-size '${{ inputs.chunk_size }}'"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN ONLY: no rows will be uploaded."
            eval "python scripts/migrate_csv_to_supabase.py $ARGS --dry-run"
          else
            test -n "$SUPABASE_URL" || { echo "Missing SUPABASE_URL secret"; exit 1; }
            test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "Missing SUPABASE_SERVICE_ROLE_KEY secret"; exit 1; }
            eval "python scripts/migrate_csv_to_supabase.py $ARGS"
          fi

      - name: Check Supabase counts
        if: ${{ inputs.dry_run == 'false' }}
        working-directory: repo
        run: python scripts/check_supabase_counts.py
