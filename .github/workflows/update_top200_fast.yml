name: Fast Update Top 200

on:
  workflow_dispatch:
  schedule:
    - cron: "15,25,45,55 * * * *"

concurrency:
  group: suno-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-top200:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Decrypt existing data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/decrypt_data.py

      - name: Fast update current Top 200
        env:
          REQUEST_SLEEP_SECONDS: "0.5"
          TOP_N_FAST_UPDATE: "200"
          SONG_RETENTION_DAYS: "4"
          GROWTH_WINDOW_HOURS: "3"
          PLAY_WEIGHT: "1.0"
          LIKE_WEIGHT: "3.0"
          COMMENT_WEIGHT: "4.0"
          GROWTH_WEIGHT: "2.5"
          FRESHNESS_WEIGHT: "35.0"
          FRESHNESS_POWER: "1.35"
        run: |
          python scripts/update_top200_fast.py

      - name: Encrypt data
        env:
          DATA_ZIP_PASSWORD: ${{ secrets.DATA_ZIP_PASSWORD }}
        run: |
          python scripts/encrypt_data.py

      - name: Remove plain CSV files
        run: |
          rm -f data/suno_song_db.csv
          rm -f data/suno_song_history.csv

      - name: Commit encrypted data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/suno_song_db.zip data/suno_song_history.zip

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fast update Top 200 Suno stats"

            git pull --rebase origin main
            git push origin main
          fi
