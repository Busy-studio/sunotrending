name: Update Comment Quality

on:
  workflow_dispatch:
  schedule:
    - cron: "12 * * * *"

permissions:
  contents: read

concurrency:
  group: suno-supabase-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  KEEP_EXPIRED_SONGS_IN_DB: "1"

jobs:
  update-comment-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Update comment quality and payload
        run: python scripts/update_supabase_data.py --mode comments
